<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Virtual Library</title>
</head>
<body>
    <header>
        <h1>Virtual Library</h1>
        <button id="toggleMode">Toggle Dark/Light Mode</button>
    </header>
    <main>
        <section id="formSection">
            <form id="bookForm">
                <input type="text" id="title" placeholder="Book Title" required>
                <input type="text" id="author" placeholder="Author" required>
                <input type="text" id="genre" placeholder="Genre" required>
                <input type="number" id="year" placeholder="Year" required>
                <textarea id="description" placeholder="Description"></textarea>
                <button type="submit">Add Book</button>
            </form>
        </section>
        <section id="filterSection">
            <input type="text" id="search" placeholder="Search..."><br>
            <label for="sort">Sort by:</label>
            <select id="sort">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
            </select>
        </section>
        <section id="bookList">
            <!-- Dynamically rendered book list will go here -->
        </section>
        <section id="favoritesSection">
            <h2>Favorites</h2>
            <div id="favoritesList"></div>
        </section>
        <section id="statistics">
            <h2>Statistics</h2>
            <p id="totalBooks">Total Books: 0</p>
        </section>
        <section id="pagination">
            <button id="prevButton">Prev</button>
            <span id="currentPage">1</span>
            <button id="nextButton">Next</button>
        </section>
        <section id="notifications"></section>
    </main>
    <footer>
        <p>&copy; 2026 Virtual Library</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
